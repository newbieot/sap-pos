<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter SAP - Corporate Sales KCU Batam</title>
    <link rel="icon" type="image/png" href="favicon-sap-pos.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        .pos-orange { background-color: #ff6600; }
        .pos-orange-text { color: #ff6600; }
        .border-pos { border-color: #ff6600; }
        .hover-pos:hover { background-color: #e65c00; }
        #dropZone.dragover {
            background-color: #fff7ed;
            border-color: #ff6600;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

    <header class="bg-white shadow-sm p-4 px-6 flex justify-between items-center border-b-4 border-pos">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Danantara_Indonesia_%28no_SW%29.svg/960px-Danantara_Indonesia_%28no_SW%29.svg.png" 
             alt="Logo Danantara" class="h-10 md:h-12 object-contain">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/POSIND_2023_%28with_wordmark%29.svg" 
             alt="Logo Pos Indonesia" class="h-10 md:h-12 object-contain">
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6">
        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-3xl w-full text-center border border-gray-100">
            <h1 class="text-3xl font-extrabold text-gray-800 mb-2">Mile App Template Converter</h1>
            <p class="text-gray-500 mb-8 font-medium italic text-sm text-orange-600">Update: Preview File, Tombol Proses & Auto-Fit Column</p>

            <div id="dropZone" class="group border-4 border-dashed border-gray-200 rounded-2xl p-10 bg-gray-50 hover:bg-orange-50 hover:border-pos transition-all duration-300 relative">
                
                <div id="uploadPrompt" class="flex flex-col items-center">
                    <input type="file" id="fileUpload" accept=".xlsx, .xls" class="hidden" />
                    <label for="fileUpload" class="cursor-pointer flex flex-col items-center w-full">
                        <div class="bg-orange-100 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform pointer-events-none">
                            <svg class="w-12 h-12 pos-orange-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                        </div>
                        <span class="text-xl font-bold text-gray-700 pointer-events-none">Tarik & Lepas File Excel di Sini</span>
                        <span class="text-sm text-gray-400 mt-2 pointer-events-none font-medium">Atau klik untuk memilih file manual</span>
                    </label>
                </div>

                <div id="filePreview" class="hidden flex flex-col items-center justify-center w-full">
                    <div class="flex items-center justify-between bg-white border-2 border-orange-200 p-4 rounded-xl w-full max-w-md shadow-sm">
                        <div class="flex items-center overflow-hidden">
                            <svg class="w-8 h-8 text-green-500 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
                            <span id="fileNameDisplay" class="font-semibold text-gray-700 truncate">namafile.xlsx</span>
                        </div>
                        <button id="removeFileBtn" class="ml-4 p-2 text-red-500 hover:bg-red-50 rounded-full transition-colors flex-shrink-0" title="Hapus File">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <button id="processBtn" class="mt-6 pos-orange hover-pos text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:-translate-y-1 w-full max-w-md text-lg">
                        Proses File
                    </button>
                </div>
                
            </div>

            <div id="statusContainer" class="mt-8 text-left bg-gray-50 p-6 rounded-xl border border-gray-200 hidden">
                <h3 class="font-bold text-gray-800 mb-3 flex items-center">
                    <span class="pos-orange w-2 h-6 rounded-full mr-2"></span>
                    Log Aktivitas
                </h3>
                <ul id="statusList" class="space-y-2 text-sm text-gray-600"></ul>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white p-6 text-center">
        <p class="text-sm opacity-80 font-medium">Corporate Sales Team KCU Batam 29400 Pos Indonesia</p>
    </footer>

    <script>
        const fileInput = document.getElementById('fileUpload');
        const dropZone = document.getElementById('dropZone');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const filePreview = document.getElementById('filePreview');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const removeFileBtn = document.getElementById('removeFileBtn');
        const processBtn = document.getElementById('processBtn');
        
        const statusContainer = document.getElementById('statusContainer');
        const statusList = document.getElementById('statusList');

        let currentFile = null;

        // --- Logika UI File Selection ---
        function setFile(file) {
            if (!file) return;
            currentFile = file;
            fileNameDisplay.textContent = file.name;
            uploadPrompt.classList.add('hidden');
            filePreview.classList.remove('hidden');
            statusContainer.classList.add('hidden'); // Sembunyikan log lama
            statusList.innerHTML = "";
        }

        function removeFile(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            currentFile = null;
            fileInput.value = ""; // Reset input file
            uploadPrompt.classList.remove('hidden');
            filePreview.classList.add('hidden');
        }

        // Event Listener Hapus File
        removeFileBtn.addEventListener('click', removeFile);

        // --- Fitur Drag & Drop ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                if(!currentFile) dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', e => {
            if(!currentFile) setFile(e.dataTransfer.files[0]);
        }, false);
        
        fileInput.addEventListener('change', e => setFile(e.target.files[0]));


        // --- Logika Inti Proses Data ---
        processBtn.addEventListener('click', () => {
            if (!currentFile) return;
            
            // Ubah tombol jadi loading state
            processBtn.textContent = "Memproses...";
            processBtn.disabled = true;
            processBtn.classList.add('opacity-75', 'cursor-not-allowed');

            statusList.innerHTML = "";
            addLog(`Membaca file: ${currentFile.name}`);

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const today = new Date().toLocaleDateString('id-ID', {day: '2-digit', month: '2-digit', year: 'numeric'}).replace(/\//g, '');
                    
                    // 1. Proses Sheet COD
                    if (workbook.SheetNames.includes('COD')) {
                        const ws = workbook.Sheets['COD'];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { range: 2, defval: "" });
                        const filtered = jsonData.filter(row => {
                            const awb = findKey(row, ['No. AWB', 'No.AWB', 'AWB']);
                            return awb && String(awb).trim() !== "";
                        });

                        if (filtered.length > 0) {
                            const codTemplate = filtered.map(row => ({
                                'nama_penerima': findKey(row, ['Penerima']) || "",
                                'telp_penerima': findKey(row, ['Tlp1', 'Telepon']) || "",
                                'alamat_penerima': findKey(row, ['Alamat Penerima', 'Alamat']) || "",
                                'zip_code_penerima': '29411',
                                'zona_penerima': '29400',
                                'koli_description': findKey(row, ['Keterangan Barang', 'Isi']) || "",
                                'koli_weight': findKey(row, ['Berat']) || "1",
                                'koli_width': 10, 'koli_height': 10, 'koli_length': 10,
                                'account_pgm': '0166648410',
                                'instruksi_pengiriman': findKey(row, ['No. AWB', 'No.AWB', 'AWB']) || "",
                                'harga_barang': cleanCurrency(findKey(row, ['Nilai COD', 'COD'])),
                                'ref_no': findKey(row, ['No. AWB', 'No.AWB', 'AWB']) || "",
                                'Jenis_Barang': 'PAKET',
                                'COD': 'COD',
                                'statusRetur': 0,
                                'INS': null // Blank asli untuk Mile App
                            })).sort((a, b) => a.harga_barang - b.harga_barang);

                            saveExcel(codTemplate, `template_cod_sapx_${today}.xlsx`);
                            addLog(`COD Sukses: ${filtered.length} baris diproses.`);
                        } else {
                            addLog(`Sheet COD ditemukan tapi kosong (diabaikan).`, false);
                        }
                    }

                    // 2. Proses Sheet NON COD
                    if (workbook.SheetNames.includes('NON COD (SPESIAL HANDLING)')) {
                        const ws = workbook.Sheets['NON COD (SPESIAL HANDLING)'];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { range: 2, defval: "" });
                        const filtered = jsonData.filter(row => {
                            const awb = findKey(row, ['No. AWB', 'No.AWB', 'AWB']);
                            return awb && String(awb).trim() !== "";
                        });

                        if (filtered.length > 0) {
                            const nonCodTemplate = filtered.map((row, idx) => ({
                                'connote_code': idx + 1,
                                'customer_code': 'WSSAP01294A',
                                'origin_data_customer_name': findKey(row, ['Pengirim']) || "ANGGUN",
                                'origin_data_customer_phone': '082169602910',
                                'origin_data_customer_address': 'SAP BATAM',
                                'origin_data_customer_zip_code': '29411',
                                'origin_data_zone_code': '29400',
                                'destination_data_customer_name': findKey(row, ['Penerima']) || "",
                                'destination_data_customer_phone': findKey(row, ['Tlp1', 'Telepon']) || "",
                                'destination_data_customer_address': findKey(row, ['Alamat Penerima', 'Alamat']) || "",
                                'destination_data_customer_zip_code': '29411',
                                'destination_data_zone_code': '29400',
                                'service_code': 'PKH',
                                'connote_sub_service_code': '911231',
                                'koli_data_koli_description': findKey(row, ['Keterangan Barang', 'Isi']) || "",
                                'koli_data_koli_weight': findKey(row, ['Berat']) || "1",
                                'koli_data_koli_width': 10, 'koli_data_koli_height': 10, 'koli_data_koli_length': 10,
                                'transaction_payment_type_name': 'INVOICE',
                                'instruksi_pengiriman': 'Tolong diantar dengan baik',
                                'harga_barang': 0,
                                'ref_no': findKey(row, ['No. AWB', 'No.AWB', 'AWB']) || "",
                                'Jenis_Barang': 'Paket',
                                'statusRetur': 'Kembali ke pengirim',
                                'INS': null // Blank asli untuk Mile App
                            })).sort((a, b) => a.destination_data_customer_name.localeCompare(b.destination_data_customer_name));

                            saveExcel(nonCodTemplate, `template_noncod_sapx_${today}.xlsx`);
                            addLog(`Non-COD Sukses: ${filtered.length} baris diproses.`);
                        } else {
                            addLog(`Sheet NON COD ditemukan tapi kosong (diabaikan).`, false);
                        }
                    }
                    
                    addLog("Selesai! File konversi otomatis terunduh.");
                    
                    // Kembalikan UI ke state awal setelah selesai
                    setTimeout(() => {
                        removeFile();
                        processBtn.textContent = "Proses File";
                        processBtn.disabled = false;
                        processBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                    }, 2000);

                } catch (err) {
                    addLog("Terjadi Kesalahan: " + err.message, false);
                    processBtn.textContent = "Coba Lagi";
                    processBtn.disabled = false;
                    processBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            };
            reader.readAsArrayBuffer(currentFile);
        });

        // --- Fungsi Bantuan ---
        function setAutoWidth(ws, data) {
            if (!data || data.length === 0) return;
            const keys = Object.keys(data[0]);
            const colWidths = keys.map(key => {
                let maxLen = key.toString().length;
                data.slice(0, 50).forEach(row => {
                    let val = row[key];
                    if (val === null || val === undefined) val = "";
                    let currentLen = val.toString().length;
                    if (currentLen > maxLen) maxLen = currentLen;
                });
                return { wch: Math.min(maxLen + 2, 60) }; 
            });
            ws['!cols'] = colWidths;
        }

        function saveExcel(data, fileName) {
            const newWs = XLSX.utils.json_to_sheet(data);
            setAutoWidth(newWs, data); 
            const newWb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWb, newWs, "Sheet1");
            XLSX.writeFile(newWb, fileName);
        }

        function addLog(msg, success = true) {
            statusContainer.classList.remove('hidden');
            const li = document.createElement('li');
            li.className = success ? "text-green-600 font-medium" : "text-red-500 font-bold";
            li.innerHTML = `<span>${success ? '✅' : '❌'}</span> ${msg}`;
            statusList.appendChild(li);
        }

        function findKey(row, possibleNames) {
            const keys = Object.keys(row);
            for (let name of possibleNames) {
                const found = keys.find(k => k.trim().toLowerCase() === name.toLowerCase());
                if (found) return row[found];
            }
            return null;
        }

        function cleanCurrency(val) {
            if (val === undefined || val === null || val === "") return 0;
            const cleanStr = String(val).replace(/Rp/gi, '').replace(/\./g, '').replace(/,/g, '').trim();
            const num = parseInt(cleanStr, 10);
            return isNaN(num) ? 0 : num;
        }
    </script>
</body>
</html>
